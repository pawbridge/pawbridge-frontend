<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포우 브릿지 - 유기동물 입양 플랫폼</title>
    
    <!-- Google Fonts - Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- 
      display=optional: 폰트가 로드되지 않으면 시스템 폰트 유지 (레이아웃 시프트 방지)
      vs display=swap: 폰트 로드 전 시스템 폰트 → 로드 후 교체 (FOUT 발생)
    -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Noto+Sans+KR:wght@100..900&display=optional" rel="stylesheet" />
    
    <!-- Material Symbols - display=block으로 아이콘 깜빡임 방지 -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
    
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
    
    <!-- 다음 우편번호 서비스 (무료, API 키 불필요) -->
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  </head>
  <body class="font-display bg-background-light dark:bg-background-dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
